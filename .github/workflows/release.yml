name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --bundles deb,appimage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        working-directory: notes-app
        run: npm install

      - name: Fetch sidecar binaries (unix)
        if: matrix.platform != 'windows-latest'
        run: ./scripts/fetch-binaries.sh ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch sidecar binaries (windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: ./scripts/fetch-binaries.sh ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: notes-app
          tagName: v__VERSION__
          releaseName: 'typos v__VERSION__'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Patch AppImage - remove bundled libwayland-client.so
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get version from tauri.conf.json
          VERSION=$(grep '"version"' notes-app/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          APPIMAGE_NAME="typos_${VERSION}_amd64.AppImage"
          TAG="v${VERSION}"

          # Download the AppImage from draft release
          gh release download "$TAG" --pattern "$APPIMAGE_NAME" --dir .

          # Install appimagetool (extract it since FUSE is not available in CI)
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          mv squashfs-root appimagetool-dir

          # Extract the AppImage
          chmod +x "$APPIMAGE_NAME"
          ./"$APPIMAGE_NAME" --appimage-extract

          # Remove bundled libwayland-client (causes EGL conflicts on Wayland)
          rm -fv squashfs-root/usr/lib/libwayland-client.so*

          # Repack
          ./appimagetool-dir/AppRun squashfs-root/ "$APPIMAGE_NAME"

          # Re-upload patched AppImage (overwrite original)
          gh release upload "$TAG" "$APPIMAGE_NAME" --clobber

          # Clean up
          rm -rf squashfs-root appimagetool appimagetool-dir
